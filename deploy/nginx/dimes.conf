# Dimes reverse proxy (nginx).
#
# One public origin in front of two independent artifacts: the built SPA (served as static files)
# and the .NET API (proxied). TLS terminates here, so the SPA and API both appear under
# https://dimes.example.com — keeping the BFF session cookie and the OIDC redirect flow same-origin.
#
# Requires the API to trust forwarded headers: set Proxy__UseForwardedHeaders=true on the API so it
# builds https redirect_uris from X-Forwarded-Proto/Host. The API must NOT be reachable directly.
#
# Deploy:
#   - Build the SPA (cd web && npm run build) and copy web/dist to the `root` below.
#   - Run the API on 127.0.0.1:5080 (or change the upstream).
#   - Register https://dimes.example.com/signin-oidc as the Keycloak Valid redirect URI.

upstream dimes_api {
    server 127.0.0.1:5080;
}

# WebSocket upgrade: "upgrade" when the client requested it, "close" otherwise. Set once at the
# server level (below) so every proxied location — including /hubs — inherits it correctly.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name dimes.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name dimes.example.com;

    ssl_certificate     /etc/ssl/dimes/fullchain.pem;
    ssl_certificate_key /etc/ssl/dimes/privkey.pem;

    # Built SPA (web/dist deployed here) — independent of the API project.
    root /var/www/dimes;
    index index.html;

    # Forwarded headers for every proxied location. NOTE: nginx does not merge proxy_set_header
    # across levels — if any location adds its own proxy_set_header it stops inheriting these, so
    # keep all of them here at the server level and don't redeclare any in a location block.
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $host;
    proxy_http_version 1.1;
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        $connection_upgrade;

    # --- Backend routes → .NET API (keep in sync with Program.cs route table) ---
    location /api/        { proxy_pass http://dimes_api; }
    location = /signin-oidc { proxy_pass http://dimes_api; }   # OIDC callback (Auth:Oidc:CallbackPath)
    location = /health      { proxy_pass http://dimes_api; }
    location /hubs/         { proxy_pass http://dimes_api; }    # SignalR (WebSocket via map above)

    # --- SPA static + client-side routing fallback ---
    location / {
        try_files $uri $uri/ /index.html;
    }
}
